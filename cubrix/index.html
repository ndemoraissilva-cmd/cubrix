<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cubrix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrap">
        <div class="board">
            <h1 class="title">CUBRIX</h1>
            <div id="currentTime">--:--:--</div>
            <div class="canvas-wrap">
                <canvas id="game" width="200" height="400"></canvas>
            </div>
        </div>
        
        <div class="side">
            <div class="card">
                <div class="label">Pontos</div>
                <div class="big" id="score">0</div>
            </div>
            
            <div class="card">
                <div class="label">Linhas</div>
                <div class="big" id="lines">0</div>
            </div>
            
            <div class="card" style="text-align:center">
                <div class="label">Próxima</div>
                <canvas id="nextBox"></canvas>
            </div>
            
            <div class="card controls">
                <div class="label">Teclas</div>
                <p><kbd>WASD</kbd> / <kbd>Setas</kbd></p>
                <p><kbd>Espaço</kbd> Drop</p>
                <button class="btn" id="restart">Reiniciar</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
